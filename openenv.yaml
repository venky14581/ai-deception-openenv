name: ai-deception-openenv
version: 1
environment: cyber-security
framework: openenv

entrypoint: inference.py

api:
  reset: /reset
  step: /step
  state: /state

tasks:
  - name: easy
  - name: medium
  - name: hard

actions:
  - detect_attack
  - deploy_honeypot
  - fake_database
  - block_ip

observations:
  - failed_logins
  - port_scans
  - suspicious_ips
  - total_requests
  - attack_types

reward_range: [0.0, 1.0]